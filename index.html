<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🎂 Birthday Blowout | Blow the Candles!</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b2b3b 0%, #1a3f2c 100%);
      font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.5rem;
      overflow-y: auto;
    }

  .star {
  position: fixed;
  pointer-events: none;
  z-index: 1500;
  animation: floatStar 1.5s ease-out forwards;
  transform: translate(-50%, -50%);
}
    @keyframes floatStar {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.6);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.5);
      }
    }

    .birthday-card {
      max-width: 550px;
      width: 100%;
      background: rgba(255, 250, 235, 0.97);
      border-radius: 2rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.8);
      overflow: hidden;
      padding: 0.8rem 1rem 1rem;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #e85d04;
      text-shadow: 2px 2px 0 #ffd966;
      margin-bottom: 0.1rem;
      line-height: 1.2;
    }

    .sub {
      text-align: center;
      color: #8b5a2b;
      font-weight: 600;
      margin-bottom: 0.8rem;
      font-size: 0.75rem;
    }

    .personalization {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      background: #fff2e0;
      padding: 0.5rem 0.8rem;
      border-radius: 50px;
      margin-bottom: 0.8rem;
    }

    .name-input {
      flex: 2;
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 0 0.6rem;
      border-radius: 40px;
      box-shadow: inset 0 1px 3px #0001, 0 1px 2px white;
    }

    .name-input label {
      font-weight: 700;
      color: #bc6c25;
      font-size: 0.8rem;
    }

    .name-input input {
      border: none;
      padding: 8px 0;
      font-size: 0.9rem;
      background: transparent;
      outline: none;
      font-family: inherit;
      flex: 1;
      min-width: 0;
      width: 100%;
      font-weight: 500;
    }

    .wish-badge {
      background: #f48c06;
      border-radius: 40px;
      padding: 6px 12px;
      color: white;
      font-weight: 600;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .cake-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0.4rem 0 0.6rem;
    }

    .cake {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.25));
    }

    .cake-base {
      width: 220px;
      height: 80px;
      border-radius: 18px 18px 35px 35px;
      background: linear-gradient(145deg, #f7da9e, #e9bc7a);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.1), 0 6px 10px rgba(0,0,0,0.2);
      border-bottom: 4px solid #c28a4b;
    }

    .cake-middle {
      width: 190px;
      height: 55px;
      border-radius: 18px 18px 25px 25px;
      margin-bottom: -12px;
      background: linear-gradient(135deg, #ffe0a3, #f2c77a);
    }

    .cake-top {
      width: 160px;
      height: 38px;
      border-radius: 25px 25px 18px 18px;
      margin-bottom: 4px;
      background: radial-gradient(circle at 30% 30%, #fff0bc, #f7c46e);
    }

    .candles-container {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: -15px;
      z-index: 10;
      position: relative;
      top: 10px;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25));
    }

    .candle-body {
      background: linear-gradient(145deg, #ff7777, #e34234);
      width: 26px;
      height: 62px;
      border-radius: 15px 15px 6px 6px;
    }

    .flame {
      width: 24px;
      height: 36px;
      background: radial-gradient(circle at 35% 30%, #ffdd77, #ffaa33, #ff6600);
      border-radius: 50% 50% 40% 40%;
      filter: drop-shadow(0 0 10px #ffaa44) brightness(1.2);
      margin-bottom: -10px;
      transform-origin: bottom;
      transition: all 0.2s cubic-bezier(0.3, 1.2, 0.5, 1);
      cursor: pointer;
      animation: flickerGlow 0.2s infinite alternate;
    }

    @keyframes flickerGlow {
      0% { 
        transform: scale(1) translateY(0px); 
        filter: drop-shadow(0 0 6px #ffaa44) brightness(1);
      }
      100% { 
        transform: scale(1.08) translateY(-2px); 
        filter: drop-shadow(0 0 16px #ff8833) brightness(1.3);
      }
    }

    .flame.extinguished {
      opacity: 0;
      transform: scale(0.2) translateY(10px);
      filter: none;
      animation: none;
      transition: 0.25s ease-out;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin: 0.5rem 0 0.6rem;
    }

    button {
      background: #2a9d8f;
      border: none;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 10px 16px;
      border-radius: 60px;
      min-width: 130px;
      color: white;
      cursor: pointer;
      transition: transform 0.08s linear, background 0.2s;
      box-shadow: 0 4px 0 #1e6b5e;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1e6b5e;
    }

    button.mic-btn {
      background: #e76f51;
      box-shadow: 0 4px 0 #b6451e;
    }

    button.reset-btn {
      background: #4a6fa5;
      box-shadow: 0 4px 0 #2c4a6e;
    }

    button.music-btn {
      background: #bc6c25;
      box-shadow: 0 4px 0 #8b4c1a;
    }

    .music-control {
      display: flex;
      justify-content: center;
      margin: 0.4rem 0;
    }

    .music-toggle {
      background: #8b5a2b;
      box-shadow: 0 4px 0 #5a3a1a;
      padding: 8px 20px;
      font-size: 0.85rem;
      min-width: 180px;
    }

    .status {
      text-align: center;
      background: #e9e3d5;
      border-radius: 50px;
      padding: 8px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #2c3e2f;
      margin-top: 0.5rem;
      line-height: 1.3;
    }

    .blow-prompt {
      background: linear-gradient(135deg, #2c5f2d, #1e3a1e);
      backdrop-filter: blur(12px);
      color: #ffec9f;
      border-radius: 999px;
      padding: 0.6rem 0.8rem;
      margin-top: 0.6rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.8rem;
      border: 1px solid #ffd966;
    }

    .blow-prompt.hidden {
      display: none;
    }

    .celebration-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1200;
      overflow: hidden;
    }

    .celebration-burst span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 38px;
      border-radius: 25px;
      opacity: 0;
      transform-origin: bottom center;
      --angle: 0deg;
      transform: translate(-50%, -50%) rotate(var(--angle));
      animation: burstFly 0.9s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
    }

    @keyframes burstFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) scaleY(0.3);
      }
      40% {
        opacity: 1;
        transform: translate(-50%, -200%) rotate(var(--angle)) scaleY(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -500%) rotate(var(--angle)) scaleY(0.8);
      }
    }

    .popup-message {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -40%) scale(0.85);
      background: linear-gradient(135deg, #2c2b2b, #111);
      backdrop-filter: blur(18px);
      color: #ffd966;
      font-size: 1.3rem;
      font-weight: 800;
      padding: 0.8rem 1.5rem;
      border-radius: 70px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,215,0,0.6);
      z-index: 1300;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s ease-out;
      text-align: center;
      white-space: nowrap;
    }

    .popup-message.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    footer {
      text-align: center;
      font-size: 0.6rem;
      margin-top: 0.6rem;
      color: #ab8a60;
    }

    /* Ensure all buttons visible without scroll on most phones */
    @media (max-width: 550px) {
      body {
        padding: 0.3rem;
        align-items: flex-start;
        overflow-y: auto;
      }
      .birthday-card {
        max-width: 100%;
        padding: 0.6rem 0.8rem 0.8rem;
      }
      h1 { font-size: 1.4rem; }
      .sub { font-size: 0.7rem; margin-bottom: 0.6rem; }
      .personalization { padding: 0.4rem 0.6rem; margin-bottom: 0.6rem; }
      .cake-stage { margin: 0.3rem 0 0.4rem; }
      .candles-container { gap: 8px; }
      .candle-body { width: 22px; height: 52px; }
      .flame { width: 20px; height: 30px; }
      .cake-base { width: 180px; height: 68px; }
      .cake-middle { width: 155px; height: 48px; }
      .cake-top { width: 130px; height: 32px; }
      button { padding: 8px 12px; min-width: 110px; font-size: 0.75rem; }
      .music-toggle { min-width: 150px; font-size: 0.75rem; }
      .actions { gap: 0.5rem; margin: 0.4rem 0; }
      .status { font-size: 0.7rem; padding: 6px 8px; margin-top: 0.4rem; }
      .blow-prompt { font-size: 0.7rem; padding: 0.5rem 0.7rem; margin-top: 0.5rem; }
      .popup-message { font-size: 1rem; padding: 0.6rem 1.2rem; white-space: nowrap; }
      footer { font-size: 0.55rem; margin-top: 0.5rem; }
    }

    @media (max-height: 700px) {
      .birthday-card { padding: 0.5rem 0.8rem 0.7rem; }
      .cake-stage { margin: 0.2rem 0 0.3rem; }
      .actions { margin: 0.3rem 0; }
      .status { margin-top: 0.3rem; }
      .blow-prompt { margin-top: 0.4rem; }
    }
  </style>
</head>
<body>

<div class="birthday-card">
  <h1>🎂 BLOW THE CANDLES 🕯️</h1>
  <div class="sub">✨ Make a wish & blow into your microphone ✨</div>

  <div class="personalization">
    <div class="name-input">
      <label>🎈 Name:</label>
      <input type="text" id="birthdayName" placeholder="Your name" value="Mhademo" maxlength="20">
    </div>
    <div class="wish-badge">
      💫 "Make a wish"
    </div>
  </div>

  <div class="cake-stage">
    <div class="cake">
      <div class="candles-container" id="candlesContainer"></div>
      <div class="cake-top"></div>
      <div class="cake-middle"></div>
      <div class="cake-base"></div>
    </div>
  </div>

  <div class="actions">
    <button id="startMicBtn" class="mic-btn">🎤 Activate Mic</button>
    <button id="resetBtn" class="reset-btn">🔄 Relight</button>
  </div>

  <div class="music-control">
    <button id="playMusicBtn" class="music-toggle">🎵 Play Birthday Music 🎵</button>
  </div>

  <div id="statusMsg" class="status" role="status" aria-live="polite">
    🔥 Tap "Activate Mic" and blow strongly!
  </div>
  <div id="blowPrompt" class="blow-prompt">
    💨 Keep blowing — the louder, the faster!
  </div>
  <footer>🎵 Tap music button for Happy Birthday | Blow into mic for celebration ✨</footer>
</div>

<div id="celebrationBurst" class="celebration-burst"></div>
<div id="birthdayPopup" class="popup-message">🎉 Happy Birthday <span id="popupName">Friend</span>! 🎂🎈</div>

<!-- Audio element for real birthday song -->
<audio id="birthdaySong" preload="auto">
  <source src="https://www.soundjay.com/misc/sounds/birthday-song-01.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // DOM Elements
    const candlesContainer = document.getElementById('candlesContainer');
    const startMicBtn = document.getElementById('startMicBtn');
    const resetBtn = document.getElementById('resetBtn');
    const playMusicBtn = document.getElementById('playMusicBtn');
    const statusDiv = document.getElementById('statusMsg');
    const blowPromptDiv = document.getElementById('blowPrompt');
    const celebrationBurst = document.getElementById('celebrationBurst');
    const birthdayPopup = document.getElementById('birthdayPopup');
    const popupNameSpan = document.getElementById('popupName');
    const nameInput = document.getElementById('birthdayName');
    const birthdayAudio = document.getElementById('birthdaySong');

    // State
    let mediaStream = null;
    let audioContext = null;
    let sourceNode = null;
    let analyserNode = null;
    let animationFrameId = null;
    let isMicActive = false;
    let candlesBlown = false;
    let currentFlames = [];
    let consecutiveBlowFrames = 0;
    const BLOW_THRESHOLD = 14;
    const MIN_BLOW_FRAMES = 2;

    // Music state
    let musicEnabled = false;
    let isPlayingMelody = false;
    let musicInterval = null;

    // Happy Birthday notes for Web Audio fallback
    const NOTE_FREQS = [
      261.63, 261.63, 293.66, 261.63, 349.23, 329.63,
      261.63, 261.63, 293.66, 261.63, 392.00, 349.23,
      261.63, 261.63, 523.25, 440.00, 349.23, 329.63, 293.66,
      466.16, 466.16, 440.00, 349.23, 392.00, 349.23
    ];
    const NOTE_DUR = [0.45, 0.45, 0.45, 0.45, 0.45, 1, 0.45, 0.45, 0.45, 0.45, 0.45, 1, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 0.45, 1.2];

    // 🌟 STAR BURST FUNCTION
function launchStars() {
  const starCount = 30;
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  const starEmojis = ['✨', '⭐', '🌟', '💫'];

  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star';

    star.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];

    // 🔥 ALL stars start from center
    star.style.left = centerX + 'px';
    star.style.top = centerY + 'px';

    // 🔥 burst direction (like explosion)
    const angle = Math.random() * 2 * Math.PI;
    const distance = 150 + Math.random() * 250;

    const x = Math.cos(angle) * distance + 'px';
    const y = Math.sin(angle) * distance + 'px';

    star.style.setProperty('--x', x);
    star.style.setProperty('--y', y);

    star.style.fontSize = (16 + Math.random() * 18) + 'px';

    document.body.appendChild(star);

    setTimeout(() => {
      star.remove();
    }, 1500);
  }
}
    // 🎵 PLAY REAL SONG (audio element)
    function playBirthdaySong() {
      if (birthdayAudio) {
        birthdayAudio.currentTime = 0;
        birthdayAudio.play().catch(err => {
          console.log("Audio play failed, using Web Audio fallback", err);
          playWebAudioMelody();
        });
      } else {
        playWebAudioMelody();
      }
    }

    // Web Audio fallback
    async function playWebAudioMelody() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') await ctx.resume();
        let currentTime = ctx.currentTime;
        for (let i = 0; i < NOTE_FREQS.length; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = NOTE_FREQS[i];
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.25, currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, currentTime + NOTE_DUR[i]);
          osc.start(currentTime);
          osc.stop(currentTime + NOTE_DUR[i]);
          currentTime += NOTE_DUR[i] + 0.02;
        }
        const totalDuration = NOTE_DUR.reduce((a, b) => a + b, 0) + 0.8;
        await new Promise(resolve => setTimeout(resolve, totalDuration * 1000));
        await ctx.close();
      } catch (err) {
        console.error("Web Audio error:", err);
      }
    }

    // 🔊 VOICE MESSAGE
    function speakBirthday(name) {
      try {
        const msg = new SpeechSynthesisUtterance(`Happy Birthday ${name}`);
        msg.pitch = 1.2;
        msg.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
      } catch (e) {
        console.log("Speech not supported");
      }
    }

    // Create candles
    function createCandles(count = 6) {
      candlesContainer.innerHTML = '';
      const flames = [];
      for (let i = 0; i < count; i++) {
        const candleDiv = document.createElement('div');
        candleDiv.className = 'candle';
        const flameDiv = document.createElement('div');
        flameDiv.className = 'flame';
        const bodyDiv = document.createElement('div');
        bodyDiv.className = 'candle-body';
        candleDiv.appendChild(flameDiv);
        candleDiv.appendChild(bodyDiv);
        candlesContainer.appendChild(candleDiv);
        flames.push(flameDiv);
      }
      return flames;
    }

    // Relight candles
    function relightCandles() {
      if (!currentFlames.length) return;
      currentFlames.forEach(flame => {
        flame.classList.remove('extinguished');
      });
      candlesBlown = false;
      consecutiveBlowFrames = 0;
      if (isMicActive) {
        statusDiv.innerHTML = "🎙️ Microphone active — Candles relit! Make a wish & blow! 💨";
      } else {
        statusDiv.innerHTML = "🕯️ Candles are lit again! Tap mic button to enable blow magic.";
      }
      blowPromptDiv.classList.remove('hidden');
      birthdayPopup.classList.remove('show');
    }

    // Celebration burst
    function launchRichBurst() {
      if (!celebrationBurst) return;
      celebrationBurst.innerHTML = '';
      const colorsList = ['#ffd966', '#ff8c42', '#f94144', '#90be6d', '#577590', '#f9c74f', '#f9844a', '#ee6c4d'];
      const sparkCount = 22;
      for (let i = 0; i < sparkCount; i++) {
        const stick = document.createElement('span');
        const angle = (i / sparkCount) * 360 + Math.random() * 15;
        stick.style.background = colorsList[i % colorsList.length];
        stick.style.setProperty('--angle', `${angle}deg`);
        stick.style.left = `${50 + (Math.random() - 0.5) * 60}%`;
        stick.style.top = `${50 + (Math.random() - 0.5) * 50}%`;
        stick.style.width = `${8 + Math.random() * 10}px`;
        stick.style.height = `${26 + Math.random() * 24}px`;
        stick.style.animationDelay = `${Math.random() * 0.15}s`;
        celebrationBurst.appendChild(stick);
      }
      setTimeout(() => {
        if (celebrationBurst) celebrationBurst.innerHTML = '';
      }, 1200);
    }

    // EXTINGUISH ALL - COMPLETE CELEBRATION
    function extinguishCandlesAndCelebrate() {
      if (candlesBlown) return;
      if (!currentFlames.length) return;
      
      currentFlames.forEach(flame => {
        flame.classList.add('extinguished');
      });
      candlesBlown = true;
      
      // 🎉 CONFETTI
      canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, startVelocity: 20 });
      setTimeout(() => {
        canvasConfetti({ particleCount: 90, spread: 65, origin: { y: 0.6, x: 0.2 } });
        canvasConfetti({ particleCount: 90, spread: 65, origin: { y: 0.6, x: 0.8 } });
      }, 100);
      
      // 🌟 STAR EFFECT
      launchStars();
      
      // 🎇 BURST EFFECT
      launchRichBurst();
      
      // 🎵 PLAY BIRTHDAY SONG
      playBirthdaySong();
      
      // 👤 GET NAME
      let userName = nameInput.value.trim();
      if (userName === "") userName = "Friend";
      popupNameSpan.textContent = userName;
      
      // 🔊 SPEAK BIRTHDAY
      speakBirthday(userName);
      
      // 🎉 POPUP
      birthdayPopup.classList.add('show');
      setTimeout(() => birthdayPopup.classList.remove('show'), 3800);
      
      statusDiv.innerHTML = `🎉🎂 HAPPY BIRTHDAY ${userName.toUpperCase()}! 🎂🎉`;
      blowPromptDiv.classList.add('hidden');
      
      setTimeout(() => {
        canvasConfetti({ particleCount: 50, spread: 40, startVelocity: 12 });
      }, 300);
    }

    // Microphone setup
    async function initMicrophone() {
      if (mediaStream) {
        stopMicrophoneTracks();
      }
      if (audioContext && audioContext.state !== 'closed') {
        await audioContext.close();
        audioContext = null;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioContext.createMediaStreamSource(stream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 1024;
        analyserNode.smoothingTimeConstant = 0.25;
        sourceNode.connect(analyserNode);
        if (audioContext.state === 'suspended') await audioContext.resume();
        
        isMicActive = true;
        if (candlesBlown) relightCandles();
        else relightCandles();
        
        statusDiv.innerHTML = "🎤 Microphone ready! 💨 Blow strongly!";
        startMicBtn.textContent = "🎤 Mic Active ✅";
        
        startBlowMonitoring();
      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = "❌ Microphone access denied. Please allow permissions.";
        isMicActive = false;
        startMicBtn.textContent = "🎤 Retry Mic";
      }
    }

    function startBlowMonitoring() {
      if (!analyserNode || !isMicActive) return;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      const bufferLength = analyserNode.fftSize;
      const dataArray = new Uint8Array(bufferLength);
      
      function monitor() {
        if (!isMicActive || !analyserNode || candlesBlown) {
          if (animationFrameId) cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
          return;
        }
        analyserNode.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < bufferLength; i++) {
          let v = (dataArray[i] - 128) / 128;
          sum += v * v;
        }
        let rms = Math.sqrt(sum / bufferLength);
        let volume = rms * 100;
        
        if (!candlesBlown && isMicActive) {
          if (volume > BLOW_THRESHOLD) {
            consecutiveBlowFrames++;
            if (consecutiveBlowFrames >= MIN_BLOW_FRAMES) {
              extinguishCandlesAndCelebrate();
              consecutiveBlowFrames = 0;
              if (animationFrameId) cancelAnimationFrame(animationFrameId);
              animationFrameId = null;
              return;
            }
          } else {
            consecutiveBlowFrames = Math.max(0, consecutiveBlowFrames - 0.7);
          }
          
          if (volume > 40 && !candlesBlown) {
            statusDiv.innerHTML = `💨 Great blow! Volume: ${Math.floor(volume)} — Keep going! 🕯️`;
          } else if (!candlesBlown) {
            statusDiv.innerHTML = `🎤 Blow into mic! (${Math.floor(volume)}) 💨`;
          }
        }
        
        if (!candlesBlown && isMicActive) {
          animationFrameId = requestAnimationFrame(monitor);
        } else {
          if (animationFrameId) cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      }
      animationFrameId = requestAnimationFrame(monitor);
    }

    function stopMicrophoneTracks() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      if (sourceNode) try { sourceNode.disconnect(); } catch(e) {}
      if (analyserNode) try { analyserNode.disconnect(); } catch(e) {}
      if (audioContext) { audioContext.close().catch(e=>null); audioContext = null; }
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      isMicActive = false;
    }

    function resetCakeAndMic() {
      relightCandles();
      if (isMicActive && analyserNode && !candlesBlown) {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        consecutiveBlowFrames = 0;
        startBlowMonitoring();
        statusDiv.innerHTML = "🎙️ Candles relit! Blow again! 💨";
      } else if (!isMicActive) {
        statusDiv.innerHTML = "🕯️ Candles lit! Tap mic button to start.";
      }
      blowPromptDiv.classList.remove('hidden');
    }

    // Music player
    async function playHappyBirthdayMelody() {
      if (!musicEnabled) return false;
      if (isPlayingMelody) return false;
      isPlayingMelody = true;
      await playWebAudioMelody();
      isPlayingMelody = false;
      return true;
    }

    function startContinuousMusic() {
      if (musicInterval) clearInterval(musicInterval);
      musicInterval = setInterval(async () => {
        if (musicEnabled && !isPlayingMelody && !candlesBlown) {
          await playHappyBirthdayMelody();
        }
      }, 10000);
    }

    function stopContinuousMusic() {
      if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
      }
    }

    async function enableMusic() {
      if (musicEnabled) {
        musicEnabled = false;
        stopContinuousMusic();
        playMusicBtn.textContent = "🎵 Play Birthday Music 🎵";
        playMusicBtn.style.animation = "none";
        statusDiv.innerHTML = "🎵 Music disabled. Tap button to enable! 🎵";
      } else {
        musicEnabled = true;
        playMusicBtn.textContent = "🔊 Music ON 🎵";
        playMusicBtn.style.animation = "pulseMusic 2s infinite";
        statusDiv.innerHTML = "🎵 Happy Birthday melody playing! 🎵";
        await playHappyBirthdayMelody();
        startContinuousMusic();
      }
    }

    // Event Listeners
    startMicBtn.addEventListener('click', () => {
      initMicrophone().catch(e => statusDiv.innerHTML = "Mic error: " + e.message);
    });
    
    resetBtn.addEventListener('click', () => {
      resetCakeAndMic();
    });
    
    playMusicBtn.addEventListener('click', async () => {
      await enableMusic();
    });
    
    nameInput.addEventListener('input', () => {
      const name = nameInput.value.trim() || "Friend";
      popupNameSpan.textContent = name;
    });
    
    // Initialize candles
    currentFlames = createCandles(6);
    relightCandles();
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (mediaStream) stopMicrophoneTracks();
      if (musicInterval) clearInterval(musicInterval);
      window.speechSynthesis.cancel();
    });
  })();
</script>
</body>
</html>
